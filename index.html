<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1f1710">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>꼬미의 부엌</title>
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="icon" type="image/png" href="assets/apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="꼬미의 부엌">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Galmuri11/Galmuri11.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Galmuri11/subsets/Galmuri11-dynamic-subset.css">
<style>
/* ===== Design A · 따뜻한 나무 선반 ===== */
:root{
  --bg:#f6e9cd;          /* screen base */
  --ink:#4a3526;         /* primary text */
  --ink2:#8a6f54;        /* muted text */
  --ink3:#a07b52;        /* label */
  --line:#6b4527;        /* heavy border / wood */
  --line2:#caa877;       /* soft border */
  --card:#fffaf0;        /* card bg */
  --tan:#efdcb6;         /* panel */
  --tan2:#f3d9ad;        /* topbar / shelf */
  --terra:#c8553d;       /* accent (꼬미) */
  --terra-d:#8a3a28;
  --green:#7d9b54;
  --green-d:#4f6b34;
  --amber:#e0a437;
  --shadow:#c8a574;
  --pink:#fbe7df;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Galmuri11',monospace;
  background:#1f1710;
  color:var(--ink);
  overscroll-behavior:none;
}
img{image-rendering:pixelated;-webkit-user-drag:none;user-select:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea{font-family:inherit;}

/* phone frame on desktop, fullscreen on mobile */
#frame{
  max-width:430px;margin:0 auto;height:100dvh;position:relative;
  background:var(--bg);
  background-image:repeating-linear-gradient(#00000000 0 38px,#bb9a6e22 38px 40px);
  display:flex;flex-direction:column;overflow:hidden;
  /* 상단 노치/베젤 여백 — 가짜 상태바 대신 세이프에어리어 확보 */
  padding-top:max(env(safe-area-inset-top), 14px);
}
@media(min-width:480px){
  body{display:flex;align-items:center;justify-content:center;padding:18px;}
  #frame{height:min(900px,96dvh);border-radius:40px;
    box-shadow:0 18px 50px rgba(60,40,20,.45),0 0 0 10px #1f1710,0 0 0 12px #3a2a1c;}
}

/* ===== screen scroll area ===== */
#view{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch;}
.pad{padding:6px 18px 0;}
.h-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.title{font-weight:700;font-size:18px;color:var(--ink);}
.title-lg{font-weight:700;font-size:20px;color:var(--ink);}

/* pills */
.pills{display:flex;gap:6px;}
.pill{display:flex;align-items:center;gap:5px;background:var(--card);border:2px solid var(--line2);border-radius:8px;padding:4px 8px;font-size:11px;color:var(--ink2);}
.pill img{width:13px;height:13px;}
.pill.leaf{color:#557a3f;}
.pill.warn{background:var(--pink);border-color:#d99a86;color:var(--terra);}

/* 꼬미 greeting card */
.komi-card{position:relative;background:var(--card);border:3px solid var(--line);border-radius:16px;padding:14px 14px 14px 96px;box-shadow:0 4px 0 var(--shadow),inset 0 3px 0 #fff;margin-bottom:18px;min-height:78px;}
.komi-card img.komi{position:absolute;left:-6px;bottom:-4px;width:104px;height:auto;filter:drop-shadow(0 3px 0 #00000018);}
.komi-card .who{font-size:11px;color:var(--terra);margin-bottom:6px;}
.komi-card .say{font-size:13px;line-height:1.7;color:var(--ink);}

/* section head */
.sec{display:flex;align-items:center;gap:7px;margin-bottom:12px;}
.sec img{width:16px;height:16px;}
.sec b{font-weight:700;font-size:15px;color:var(--ink);}
.sec .more{margin-left:auto;font-size:11px;color:var(--green);}

/* recipe list card */
.rlist{display:flex;flex-direction:column;gap:12px;padding-bottom:12px;}
.rcard{display:flex;gap:13px;align-items:center;background:var(--card);border:3px solid var(--line);border-radius:14px;padding:11px;box-shadow:0 4px 0 var(--shadow);text-align:left;width:100%;}
.rcard:active{transform:translateY(2px);box-shadow:0 2px 0 var(--shadow);}
.rthumb{width:62px;height:62px;flex:none;background:var(--pink);border:2px solid var(--line2);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.rthumb img{width:46px;height:46px;}
.rbody{flex:1;min-width:0;}
.rname{font-size:14px;color:var(--ink);margin-bottom:6px;}
.rmeta{display:flex;align-items:center;gap:9px;font-size:11px;color:var(--ink2);}
.rmeta .ico{display:flex;align-items:center;gap:3px;}
.rmeta img{width:12px;height:12px;}
.bar{height:7px;background:#ecdcc0;border-radius:4px;margin-top:7px;overflow:hidden;}
.bar > i{display:block;height:100%;background:var(--green);}

/* inventory tabs */
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;}
.tab{display:flex;align-items:center;gap:4px;white-space:nowrap;background:var(--card);border:2px solid var(--line2);border-radius:9px;padding:6px 9px;font-size:11px;color:var(--ink2);flex:none;}
.tab img{width:12px;height:12px;}
.tab.on{background:var(--line);border-color:#4a2f1a;color:#fbe7c8;}

/* inventory grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;padding-bottom:18px;}
.cell{background:var(--tan);border:3px solid var(--line);border-radius:12px;padding:8px 6px 7px;display:flex;flex-direction:column;align-items:center;box-shadow:inset 0 3px 0 #fff6e0,inset 0 -4px 0 #d6bd92;position:relative;}
.cell:active{transform:translateY(1px);}
.cell .dot{position:absolute;top:5px;right:6px;width:9px;height:9px;border:1px solid var(--line);border-radius:50%;}
.cell .ico{width:42px;height:42px;display:flex;align-items:center;justify-content:center;}
.cell .ico img{width:42px;height:42px;}
.cell .nm{font-size:11px;color:var(--ink);margin-top:4px;}
.cell .qt{font-size:10px;color:var(--ink2);}
.cell.add{background:#f3ead4;border:3px dashed #c0a06e;justify-content:center;min-height:96px;cursor:pointer;}
.cell.add img{width:22px;height:22px;opacity:.55;}
.cell.add .nm{color:var(--ink3);margin-top:6px;}
.empty{grid-column:1/-1;text-align:center;color:var(--ink2);font-size:12px;padding:24px 0;}

/* chat */
.chat-head{display:flex;align-items:center;gap:11px;padding:6px 18px 12px;border-bottom:3px solid var(--line);background:var(--tan2);flex:none;}
.chat-head .av{width:42px;height:42px;background:var(--card);border:2px solid var(--line);border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.chat-head .av img{width:34px;height:auto;margin-top:4px;}
.chat-head .nm{font-weight:700;font-size:15px;color:var(--ink);}
.chat-head .st{font-size:10px;color:var(--green);display:flex;align-items:center;gap:4px;}
.chat-head .st i{width:7px;height:7px;background:var(--green);border-radius:50%;display:inline-block;}
.chat-head .st.off{color:var(--ink2);} .chat-head .st.off i{background:var(--line2);}
.who-tabs{display:flex;gap:3px;background:var(--card);border:2px solid var(--line2);border-radius:10px;padding:3px;flex:none;}
.who-tabs button{font-size:11px;color:var(--ink2);padding:5px 8px;border-radius:7px;white-space:nowrap;}
.who-tabs button.on{background:var(--line);color:#fbe7c8;}
.msgs{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch;}
.row{display:flex;gap:8px;align-items:flex-end;}
.row.me{justify-content:flex-end;}
.row .av{width:32px;height:32px;flex:none;background:var(--card);border:2px solid var(--line);border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.row .av img{width:26px;margin-top:3px;}
.bub{border-radius:4px 14px 14px 14px;padding:11px 13px;font-size:13px;line-height:1.7;max-width:74%;box-shadow:0 3px 0 var(--shadow);white-space:pre-wrap;word-break:break-word;}
.bub.k{background:var(--card);border:2px solid var(--line);color:var(--ink);}
.bub.me{background:var(--terra);border:2px solid var(--terra-d);border-radius:14px 14px 4px 14px;color:#fff;box-shadow:0 3px 0 var(--terra-d);}
.chips{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;}
.chip{background:#fff;border:2px solid var(--line2);border-radius:20px;padding:7px 13px;font-size:12px;color:var(--ink2);}
.chip.hot{border-color:var(--terra);color:var(--terra);}
.rec-in-chat{display:flex;gap:10px;align-items:center;background:var(--pink);border:2px solid var(--line2);border-radius:10px;padding:8px;margin-top:10px;cursor:pointer;}
.rec-in-chat .t{width:44px;height:44px;flex:none;background:#fff;border:2px solid var(--line2);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.rec-in-chat .t img{width:34px;height:34px;}
.rec-in-chat .nm{font-size:12px;color:var(--ink);margin-bottom:3px;}
.rec-in-chat .mt{font-size:10px;color:var(--green);}
.typing{display:inline-flex;gap:4px;align-items:center;}
.typing i{width:6px;height:6px;background:var(--ink2);border-radius:50%;animation:bnc 1s infinite;}
.typing i:nth-child(2){animation-delay:.15s;} .typing i:nth-child(3){animation-delay:.3s;}
@keyframes bnc{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-4px);opacity:1;}}
.composer{padding:10px 14px calc(14px + env(safe-area-inset-bottom));background:var(--tan2);border-top:3px solid var(--line);display:flex;gap:9px;align-items:center;flex:none;}
.composer input{flex:1;background:var(--card);border:2px solid var(--line);border-radius:20px;padding:10px 15px;font-size:13px;color:var(--ink);outline:none;}
.composer input::placeholder{color:#a89070;}
.composer .send{width:42px;height:42px;flex:none;background:var(--green);border:2px solid var(--green-d);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;box-shadow:0 3px 0 var(--green-d);}
.composer .send:active{transform:translateY(2px);box-shadow:0 1px 0 var(--green-d);}
.composer .send[disabled]{opacity:.5;}

/* MY / settings */
.set-list{display:flex;flex-direction:column;gap:12px;padding-bottom:20px;}
.set-card{background:var(--card);border:3px solid var(--line);border-radius:14px;padding:14px;box-shadow:0 4px 0 var(--shadow);}
.set-card h4{margin:0 0 4px;font-size:14px;color:var(--ink);}
.set-card p{margin:0 0 10px;font-size:11px;color:var(--ink2);line-height:1.6;}
.set-card input,.set-card select{width:100%;background:var(--bg);border:2px solid var(--line2);border-radius:9px;padding:10px 12px;font-size:13px;color:var(--ink);outline:none;}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.linkbtn{background:var(--tan);border:2px solid var(--line2);border-radius:9px;padding:9px 12px;font-size:12px;color:var(--ink);}
.linkbtn.danger{color:var(--terra);border-color:#d99a86;background:var(--pink);}
.key-state{font-size:10px;padding:3px 7px;border-radius:6px;}
.key-state.ok{background:#eef3e3;color:var(--green-d);}
.key-state.no{background:var(--pink);color:var(--terra);}

/* bottom nav */
.nav{height:74px;display:flex;align-items:center;justify-content:space-around;padding:6px 12px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(#fbf3e0,#f0e0c0);border-top:3px solid var(--line);flex:none;}
.nav button{display:flex;flex-direction:column;align-items:center;gap:4px;opacity:.6;flex:1;}
.nav button.on{opacity:1;}
.nav button .ib{width:38px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.nav button.on .ib{background:var(--tan2);border:2px solid var(--line);}
.nav button img{width:18px;height:18px;}
.nav button span{font-size:10px;color:var(--line);}
.nav button.on span{color:var(--terra);}
.nav .fab{width:52px;height:52px;margin-top:-22px;background:var(--terra);border:3px solid var(--line);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 var(--terra-d);opacity:1;flex:none;}
.nav .fab img{width:24px;height:24px;}
.nav .fab:active{transform:translateY(2px);box-shadow:0 2px 0 var(--terra-d);}

/* ===== sheet / modal ===== */
.sheet-wrap{position:absolute;inset:0;z-index:50;display:none;}
.sheet-wrap.open{display:block;}
.scrim{position:absolute;inset:0;background:rgba(40,26,16,.5);animation:fade .2s;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{position:absolute;left:0;right:0;bottom:0;max-height:92%;background:var(--bg);
  background-image:repeating-linear-gradient(#00000000 0 38px,#bb9a6e22 38px 40px);
  border-radius:24px 24px 0 0;border-top:3px solid var(--line);
  display:flex;flex-direction:column;animation:up .26s cubic-bezier(.2,.9,.3,1.1);}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-head{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:3px solid var(--line);background:var(--tan2);border-radius:21px 21px 0 0;flex:none;}
.sheet-head .back{font-size:22px;color:var(--line);width:28px;text-align:left;}
.sheet-head .t{font-weight:700;font-size:16px;color:var(--ink);flex:1;}
.sheet-body{overflow-y:auto;padding:14px 18px;flex:1;-webkit-overflow-scrolling:touch;}
.sheet-foot{padding:12px 18px calc(18px + env(safe-area-inset-bottom));border-top:2px solid #e2cda0;background:var(--bg);flex:none;}

/* add-ingredient sheet bits */
.seg{display:flex;background:var(--tan);border:2px solid var(--line2);border-radius:11px;padding:4px;margin-bottom:16px;}
.seg button{flex:1;text-align:center;padding:8px 0;font-size:12px;color:var(--ink2);border-radius:8px;}
.seg button.on{background:var(--line);color:#fbe7c8;}
.lbl{font-size:12px;color:var(--ink2);margin-bottom:9px;}
.pickgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
.pick{background:var(--tan);border:2px solid var(--line2);border-radius:11px;padding:7px 0 5px;display:flex;flex-direction:column;align-items:center;}
.pick.on{background:var(--pink);border:3px solid var(--terra);box-shadow:0 3px 0 var(--shadow);}
.pick .ic{width:34px;height:34px;display:flex;align-items:center;justify-content:center;}
.pick .ic img{width:34px;height:34px;}
.pick .nm{font-size:10px;color:var(--ink2);margin-top:3px;}
.pick.on .nm{color:var(--ink);}
.stepper{display:flex;align-items:center;gap:14px;}
.stepper button{width:34px;height:34px;background:var(--card);border:2px solid var(--line);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--line);box-shadow:0 3px 0 var(--shadow);}
.stepper .val{font-weight:700;font-size:16px;color:var(--ink);min-width:54px;text-align:center;}
.loc-row{display:flex;gap:6px;margin-bottom:16px;}
.loc-row button{flex:1;text-align:center;background:var(--card);color:var(--ink2);border:2px solid var(--line2);border-radius:9px;padding:8px 0;font-size:11px;white-space:nowrap;}
.loc-row button.on{background:var(--line);color:#fbe7c8;border-color:#4a2f1a;}
.field{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:2px solid var(--line2);border-radius:11px;padding:11px 13px;margin-bottom:12px;}
.field label{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink);}
.field img{width:14px;height:14px;}
.field input{border:2px solid var(--line2);border-radius:7px;padding:5px 8px;font-size:12px;color:var(--ink);background:var(--bg);width:130px;text-align:right;outline:none;}
.cta{height:52px;width:100%;background:var(--terra);border:3px solid var(--line);border-radius:13px;display:flex;align-items:center;justify-content:center;gap:8px;color:#fff;font-weight:700;font-size:15px;box-shadow:0 4px 0 var(--terra-d);}
.cta:active{transform:translateY(2px);box-shadow:0 2px 0 var(--terra-d);}
.cta img{width:18px;height:18px;}
.cta.green{background:var(--green);border-color:var(--green-d);box-shadow:0 4px 0 var(--green-d);}
.cta.green:active{box-shadow:0 2px 0 var(--green-d);}
.cta[disabled]{opacity:.5;}

/* recipe detail */
.rd-hero{position:relative;height:118px;flex:none;background:var(--pink);background-image:repeating-linear-gradient(135deg,#f4d6c8 0 10px,#fbe7df 10px 20px);display:flex;align-items:center;justify-content:center;border-bottom:3px solid var(--line);}
.rd-hero .icon{width:78px;height:78px;background:var(--card);border:3px solid var(--line);border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 0 var(--shadow);}
.rd-hero .icon img{width:56px;height:56px;}
.rd-meta{display:flex;gap:7px;margin:8px 0 12px;flex-wrap:wrap;}
.rd-meta .m{display:flex;align-items:center;gap:5px;background:var(--card);border:2px solid var(--line2);border-radius:8px;padding:5px 9px;font-size:11px;color:var(--ink2);}
.rd-meta img{width:12px;height:12px;}
.ing-row{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.ing-row .ic{width:30px;height:30px;flex:none;background:var(--pink);border:2px solid var(--line2);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.ing-row .ic img{width:22px;height:22px;}
.ing-row .ic .sw{width:16px;height:16px;border:1px solid var(--line);border-radius:4px;}
.ing-row .nm{flex:1;min-width:0;font-size:12px;color:var(--ink);}
.ing-row .nm small{font-size:10px;color:var(--terra);}
.ing-row .amt{font-size:11px;color:var(--ink2);background:var(--card);border:2px solid var(--line2);border-radius:8px;padding:4px 9px;}
.ing-row.miss .nm{color:#b06b50;}
.ing-row .have{font-size:10px;color:var(--green-d);background:#eef3e3;border-radius:6px;padding:3px 7px;}
.sub-lbl{display:flex;align-items:center;gap:5px;margin:14px 0 8px;font-size:11px;color:var(--ink3);}
.sub-lbl img{width:13px;height:13px;}

/* toast */
#toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
  background:var(--line);color:#fbe7c8;font-size:12px;padding:9px 16px;border-radius:20px;
  opacity:0;pointer-events:none;transition:.25s;z-index:90;box-shadow:0 4px 12px rgba(0,0,0,.3);white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.nodata{color:var(--ink2);font-size:12px;text-align:center;padding:30px 10px;line-height:1.7;}
.mini-komi{width:34px;height:34px;flex:none;background:var(--card);border:2px solid var(--line);border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.mini-komi img{width:28px;margin-top:3px;}
.komi-line{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
.komi-line .bub2{background:var(--card);border:2px solid var(--line);border-radius:4px 12px 12px 12px;padding:8px 11px;font-size:12px;color:var(--ink);box-shadow:0 3px 0 var(--shadow);}
</style>
</head>
<body>
<div id="frame">
  <div id="view"><!-- screen renders here --></div>

  <div class="nav" id="nav"></div>

  <div class="sheet-wrap" id="sheet"></div>
  <div id="toast"></div>
</div>

<script>
"use strict";

/* ========================================================================
   꼬미의 부엌 — 냉장고 재고 기반 메뉴 추천 앱 (Design A)
   ======================================================================== */

const A = "assets/"; // asset path (dev). Single-file build injects window.AP with data URIs.
function asset(f){ return (window.AP && window.AP[f]) || A+f; }
const ICON = {
  home:asset("ui_home.png"), carrot:asset("ui_carrot.png"), user:asset("ui_user.png"),
  plus:asset("ui_plus.png"), plusLt:asset("ui_plus_lt.png"), clock:asset("ui_clock.png"),
  clockLt:asset("ui_clock_lt.png"), star:asset("ui_star.png"), leaf:asset("ui_leaf.png"),
  flame:asset("ui_flame.png"), fridge:asset("ui_fridge.png"), snow:asset("ui_snow.png"),
  jar:asset("ui_jar.png"), sauce:asset("ui_sauce.png"), search:asset("ui_search.png"),
  komiHead:asset("komi_head.png"), komiRelax:asset("komi_relax.png"), komiFront:asset("komi_front.png"),
  komimiHead:asset("komimi_head.png"), komimiRelax:asset("komimi_relax.png"),
};
// ingredients that have dedicated pixel art

/* ---------- ingredient art helper ---------- */
function ingIcon(name, size=42){
  const art = FOOD_ART[name];
  if(art) return `<img src="${asset(art+".png")}" style="width:${size}px;height:${size}px;" alt="${name}">`;
  const c = SWATCH[name] || "#caa877";
  const s = Math.round(size*0.42);
  return `<span class="sw" style="width:${s}px;height:${s}px;background:${c};border:1px solid var(--line);border-radius:4px;display:inline-block;"></span>`;
}

/* ====================  HELPERS  ==================== */
const $ = (s,el=document)=>el.querySelector(s);
const esc = (s="")=>s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function invNames(){ return new Set(S.inv.map(i=>i.name)); }
function freshness(it){ // returns {dot, label, color}
  if(it.dday<=1) return {color:"var(--terra)", label:"D-"+it.dday, soon:true};
  if(it.dday<=2) return {color:"var(--amber)", label:"D-"+it.dday, soon:true};
  return {color:"var(--green)", label:"신선", soon:false};
}
function soonItems(){ return S.inv.filter(i=>i.dday<=2); }
function qtyNum(q){ const m=(""+(q||"")).match(/\d+/); return m?+m[0]:1; }
// 재고가 많은 재료(양념장 제외, 5개 이상) — 과잉재고 소진 추천에 사용
function overItems(){ return S.inv.filter(i=>i.loc!=='sauce' && qtyNum(i.qty)>=5); }

// how many of a recipe's ingredients you own + 임박/과잉 신호
function recipeMatch(r){
  const have = invNames();
  const ddayByName = {}; S.inv.forEach(i=>{ if(!(i.name in ddayByName)||i.dday<ddayByName[i.name]) ddayByName[i.name]=i.dday; });
  const overSet = new Set(overItems().map(i=>i.name));
  const core = r.ingredients;
  const ownedList = core.filter(x=>have.has(x.n));
  const owned = ownedList.length, total = core.length;
  const usedDdays = ownedList.map(x=>ddayByName[x.n]).filter(d=>d!=null);
  const minUsedDday = usedDdays.length ? Math.min(...usedDdays) : 999;  // 쓰는 재료 중 가장 임박
  const usesSoon = minUsedDday<=2;
  const usesOver = ownedList.some(x=>overSet.has(x.n));
  return {owned, total, ratio:owned/total, usesSoon, minUsedDday, usesOver, missing:core.filter(x=>!have.has(x.n))};
}
function recommended(limit=99){
  return RECIPES.map(r=>({r, m:recipeMatch(r)})).sort((a,b)=>{
    if(a.m.usesSoon!==b.m.usesSoon) return b.m.usesSoon-a.m.usesSoon;                 // ④ 임박 재료 쓰는 메뉴 먼저
    if(a.m.usesSoon && b.m.usesSoon && a.m.minUsedDday!==b.m.minUsedDday)
      return a.m.minUsedDday-b.m.minUsedDday;                                          //    더 임박한 것 우선
    if(b.m.ratio!==a.m.ratio) return b.m.ratio-a.m.ratio;                              // 보유 비율 높은 것
    if(a.m.usesOver!==b.m.usesOver) return b.m.usesOver-a.m.usesOver;                  // ⑥ 과잉 재고 소진
    return a.r.time-b.r.time;
  }).slice(0,limit);
}
function barColor(ratio){ return ratio>=0.8?"var(--green)": ratio>=0.6?"var(--amber)":"var(--terra)"; }

function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove("show"), 1700);
}

  if(S.screen==="home")  { v.innerHTML = viewHome();  v.style.overflowY="auto"; }
  else if(S.screen==="fridge"){ v.innerHTML = viewFridge(); v.style.overflowY="auto"; }
  else if(S.screen==="chat")  { v.innerHTML = viewChat(); afterChat(); }
  else if(S.screen==="my")    { v.innerHTML = viewMy(); afterMy(); v.style.overflowY="auto"; }
  renderNav();
  // 같은 화면을 다시 그릴 땐 스크롤 위치 유지(최상단 점프 방지). 화면 전환이면 맨 위로.
  if(S.screen!=="chat") v.scrollTop = sameScreen ? sy : 0;
  _prevScreen = S.screen;
}

// "당근 3개, 계란 6, 우유 1팩" → [{name,qty}]
function parseQuick(text){
  return (text||"").split(/[,\n·]/).map(s=>s.trim()).filter(Boolean).map(tok=>{
    const m = tok.match(/^(.*?)\s*([0-9]+\s*[가-힣A-Za-z]*)$/);
    let name=tok, qty="1개";
    if(m && m[1].trim()){ name=m[1].trim(); qty=m[2].replace(/\s/g,""); }
    if(/^[0-9]+$/.test(qty)) qty=qty+"개";
    return {name, qty};
  });
}
function addItems(list, loc, dday){
  let n=0;
  (list||[]).forEach((it,idx)=>{
    const name=(it.name||"").trim(); if(!name) return;
    const qty=((it.qty||"")+"").trim()||"1개";
    const ex=S.inv.find(x=>x.name===name && x.loc===loc);
    if(ex){ ex.qty=qty; ex.dday=dday; }
    else S.inv.push({id:"i"+Date.now()+"_"+idx+"_"+n, name, qty, loc, dday});
    n++;
  });
  save(); return n;
}

function scanReceipt(file){
  const a=addState;
  const reader=new FileReader();
  reader.onload=async ()=>{
    a.scanning=true; a.scanErr=""; a.scanItems=null; renderAdd();
    try{
      const res=await fetch("api/receipt",{
        method:"POST", headers:{"content-type":"application/json","ngrok-skip-browser-warning":"1"},
        body: JSON.stringify({ image: reader.result })
      });
      if(!res.ok){ let m=""; try{ m=(await res.json()).error||""; }catch(e){} throw new Error(m || ("오류 "+res.status)); }
      const j=await res.json();
      a.scanItems=(j.items||[]).map(x=>({name:(x.name||"").toString().trim(), qty:(x.qty||"1개").toString().trim()})).filter(x=>x.name);
      if(!a.scanItems.length) a.scanErr="영수증에서 식재료를 못 찾았어 🥲\n좀 더 또렷하게 다시 찍어줄래?";
    }catch(err){ a.scanErr="앗, 영수증 읽기 실패 🐻\n"+(err.message||"잠시 후 다시 해줘."); }
    a.scanning=false; renderAdd();
  };
  reader.readAsDataURL(file);
}

function confirmAdd(){
  const a = addState;
  const name = (($("#customName")&&$("#customName").value.trim()) || a.name || "").trim();
  if(!name){ toast("재료 이름을 정해줘 🐻"); return; }
  const unit = ($("#unitInput")&&$("#unitInput").value.trim())||a.unit||"개";
  const exist = S.inv.find(i=>i.name===name && i.loc===a.loc);
  if(exist){ exist.qty = a.count+unit; exist.dday=a.dday; }
  else S.inv.push({id:"i"+Date.now(), name, qty:a.count+unit, loc:a.loc, dday:a.dday});
  save(); closeSheet();
  S.invTab = a.loc; S.screen="fridge"; render();
  toast(`${name} 담았어요! 🧺`);
}

async function sendChat(text){
  text = (text||"").trim();
  if(!text) return;
  if(!CLI && !S.apiKey){ toast("MY에서 API 키부터 등록해줘 🔑"); return; }

  const who = S.chatWho;
  const arr = curChat();
  arr.push({role:"user", text});
  const aIdx = arr.push({role:"assistant", text:""}) - 1;
  save();
  rerenderChatPartial();

  const sys = who==='komimi' ? komimiSystemPrompt() : komiSystemPrompt();
  const fallback = who==='komimi' ? "음… 뭐 먹지 😴" : "음… 뭐가 좋을까? 🐻";

  // 로컬 CLI 두뇌(내 구독)로 처리 — API 키 불필요
  if(CLI){ return komiViaCLI(aIdx, arr, sys, who, fallback); }

  // API 경로 (브라우저 직접 호출)
  const messages = arr.slice(0, aIdx).map(m=>({
    role: m.role==="user"?"user":"assistant",
    content: m.text || "…"
  })).filter(m=>m.content.trim());

  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "content-type":"application/json",
        "x-api-key":S.apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true",
      },
      body: JSON.stringify({
        model: S.model || "claude-haiku-4-5",
        max_tokens: 600,
        system: sys,
        messages,
        stream: true,
      }),
    });
    if(!res.ok){
      let info=""; try{ const j=await res.json(); info = j.error?.message||""; }catch(e){}
      throw new Error((res.status===401?"API 키가 올바른지 확인해줘.":info)|| ("오류 "+res.status));
    }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf="", acc="";
    while(true){
      const {value,done} = await reader.read();
      if(done) break;
      buf += dec.decode(value,{stream:true});
      const lines = buf.split("\n");
      buf = lines.pop();
      for(const line of lines){
        const t = line.trim();
        if(!t.startsWith("data:")) continue;
        const payload = t.slice(5).trim();
        if(payload==="[DONE]") continue;
        try{
          const ev = JSON.parse(payload);
          if(ev.type==="content_block_delta" && ev.delta?.type==="text_delta"){
            acc += ev.delta.text;
            arr[aIdx].text = stripTag(acc);
            updateLastBubble(arr[aIdx]);
          }
        }catch(e){}
      }
    }
    if(who!=='komimi'){
      const tag = acc.match(/\[\[recipe:([a-z_]+)\]\]/);
      if(tag && RECIPES.some(r=>r.id===tag[1])) arr[aIdx].recipeId = tag[1];
    }
    arr[aIdx].text = stripTag(acc).trim() || fallback;
    save();
    rerenderChatPartial();
  }catch(err){
    arr[aIdx].text = "앗, 연결에 문제가 생겼어 🐻\n"+(err.message||"잠시 후 다시 시도해줘.");
    save(); rerenderChatPartial();
  }
}
async function komiViaCLI(aIdx, arr, sys, who, fallback){
  const me = who==='komimi' ? '꼬미미' : '꼬미';
  const conv = arr.slice(0,aIdx).map(m=> (m.role==="user"?"엄마: ":me+": ")+(m.text||"")).join("\n");
  const tail = who==='komimi'
    ? `\n\n위 대화에 이어, 꼬미미로서 다음 한 마디만 자연스럽게 답해줘. 마지막엔 배달 메뉴 하나를 콕 집어 추천해.`
    : `\n\n위 대화에 이어, 꼬미로서 다음 한 마디만 자연스럽게 답해줘. 레시피를 콕 집어 추천할 땐 마지막 줄에 [[recipe:레시피id]] 형식으로 표시해줘.`;
  try{
    const res = await fetch("api/komi",{
      method:"POST", headers:{"content-type":"application/json","ngrok-skip-browser-warning":"1"},
      body: JSON.stringify({ system: sys, prompt: conv + tail })
    });
    if(!res.ok){ let m=""; try{ m=(await res.json()).error||""; }catch(e){} throw new Error(m || ("오류 "+res.status)); }
    const j = await res.json();
    const raw = j.text || "";
    if(who!=='komimi'){
      const tag = raw.match(/\[\[recipe:([a-z_]+)\]\]/);
      if(tag && RECIPES.some(r=>r.id===tag[1])) arr[aIdx].recipeId = tag[1];
    }
    arr[aIdx].text = stripTag(raw).trim() || fallback;
    save(); rerenderChatPartial();
  }catch(err){
    arr[aIdx].text = "앗, 연결에 문제가 생겼어 🐻\n"+(err.message||"맥에서 server.py가 켜져 있는지 확인해줘.");
    save(); rerenderChatPartial();
  }
}
function stripTag(s){ return s.replace(/\[\[recipe:[a-z_]+\]\]/g,"").trim(); }

function rerenderChatPartial(){
  const box = $("#msgs");
  if(!box){ render(); return; }
  box.innerHTML = renderMsgs();
  bindChatBody();
  box.scrollTop = box.scrollHeight;
}
function updateLastBubble(m){
  const box = $("#msgs"); if(!box) return;
  const rows = box.querySelectorAll(".row");
  const last = rows[rows.length-1];
  if(last){ const bub = last.querySelector(".bub.k"); if(bub){ bub.textContent = m.text || ""; } }
  box.scrollTop = box.scrollHeight;
}
function bindChatBody(){
  document.querySelectorAll("#introChips .chip").forEach(c=>c.onclick=()=>sendChat(c.dataset.say));
  document.querySelectorAll("#msgs [data-recipe]").forEach(c=>c.onclick=()=>openRecipe(c.dataset.recipe));
}

/* ====================  GLOBAL EVENT DELEGATION  ==================== */
document.addEventListener("click", e=>{
  const t = e.target.closest("[data-nav],[data-add],[data-tab],[data-item],[data-recipe],[data-recroll],[data-pick]");
  if(!t) return;
  if(t.hasAttribute("data-nav")){ S.screen=t.dataset.nav; render(); }
  else if(t.hasAttribute("data-add")){ openAdd(); }
  else if(t.hasAttribute("data-recroll")){ recOffset += 3; render(); }
  else if(t.hasAttribute("data-tab")){ S.invTab=t.dataset.tab; render(); }
  else if(t.hasAttribute("data-item")){ openItem(t.dataset.item); }
  else if(t.hasAttribute("data-recipe") && !t.closest("#sheet")){ openRecipe(t.dataset.recipe); }
});

/* ============  CLI(로컬) 두뇌 자동 감지 + BOOT  ============ */
let CLI = false;
fetch("api/health",{headers:{"ngrok-skip-browser-warning":"1"}}).then(r=>r.ok?r.json():null).then(j=>{
  if(j && j.mode==="cli"){ CLI = true; if(S.screen==="chat") render(); }
}).catch(()=>{});
render();
</script>
</body>
